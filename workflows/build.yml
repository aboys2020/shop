name: Build Executables

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UPX
        run: choco install upx -y

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build light CLI executable
        run: |
          pip install -r requirements-cli-light.txt
          pyinstaller packaging/cli-light.spec

      - name: Build Web executable
        run: |
          pip install -r requirements-web.txt
          pyinstaller packaging/web.spec

      - name: Copy README to dist
        run: copy README.md dist\README.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: dist/*.exe

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-executables
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.exe
          generate_release_notes: true
